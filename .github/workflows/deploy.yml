name: Deploy Portfolio to AWS S3

on:
  push:
    branches:
      - "main"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Arquivos estáticos (imagens, fontes, CSS, JS) — cache longo de 1 ano.
      # O browser só baixa novamente se o nome/hash do arquivo mudar.
      # Isso reduz latência nas visitas subsequentes e melhora os Core Web Vitals.
      - name: Deploy Static Assets (cache longo)
        run: |
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET_NAME }} \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "README.md" \
            --exclude "*.html" \
            --exclude "robots.txt" \
            --exclude "sitemap.xml" \
            --cache-control "max-age=31536000, immutable"

      # HTML, robots.txt e sitemap.xml — sempre revalidados.
      # max-age=0 + must-revalidate garante que o recrutador nunca veja
      # uma versão antiga do portfólio após um deploy.
      - name: Deploy HTML e arquivos de descoberta (sem cache)
        run: |
          for file in index.html robots.txt sitemap.xml; do
            if [ -f "$file" ]; then
              aws s3 cp "$file" s3://${{ secrets.AWS_S3_BUCKET_NAME }}/"$file" \
                --cache-control "max-age=0, no-cache, must-revalidate"
            fi
          done

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"